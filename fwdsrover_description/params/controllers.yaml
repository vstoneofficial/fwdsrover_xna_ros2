/controller_manager:
  ros__parameters:
    update_rate: 200

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    steer_position_controller:
      type: position_controllers/JointGroupPositionController

    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

steer_position_controller:
  ros__parameters:
    joints:
      - front_left_steering_joint
      - front_right_steering_joint
      - back_right_steering_joint
      - back_left_steering_joint

wheel_velocity_controller:
  ros__parameters:
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - back_right_wheel_joint
      - back_left_wheel_joint
      
gazebo_ros2_control:
  ros__parameters:
    pid_gains:
      velocity:
        front_left_wheel_joint:  {kp: 10.0, ki: 0.00, kd: 0.0}
        front_right_wheel_joint: {kp: 10.0, ki: 0.00, kd: 0.0}
        back_left_wheel_joint:   {kp: 10.0, ki: 0.00, kd: 0.0}
        back_right_wheel_joint:  {kp: 10.0, ki: 0.00, kd: 0.0}
