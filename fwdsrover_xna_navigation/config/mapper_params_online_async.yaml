# ==== 実機調整ポイント（開始）====
# ==== 実機調整ポイント（終了）====

slam_toolbox:
  ros__parameters:

    solver_plugin: solver_plugins::CeresSolver  # ソルバ設定
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    use_sim_time: false  # 実機運用が既定。Gazebo時はlaunch側からtrueを上書きする。
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    mode: mapping

    scan_queue_size: 30
    debug_logging: false
    throttle_scans: 2
    transform_publish_period: 0.02
    restamp_tf: true
    map_update_interval: 0.5  # 地図更新周期[s]。小さいほど地図反映が速いが負荷増。
    resolution: 0.05
    min_laser_range: 0.4
    max_laser_range: 30.0
    minimum_time_interval: 0.1
    transform_timeout: 0.1
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    position_covariance_scale: 20.0
    yaw_covariance_scale: 30.0

    use_scan_matching: true  # スキャンマッチング・ループ閉じ込み
    use_scan_barycenter: true
    minimum_travel_distance: 0.4  # この距離[m]以上動いたときに更新。小さくすると追従は良いがノイズ増。
    minimum_travel_heading: 0.4  # この角度[rad]以上回頭したときに更新。小さくすると回頭追従が良くなる。
    scan_buffer_size: 30
    scan_buffer_maximum_scan_distance: 8.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 5.0
    do_loop_closing: true  # ループ閉じ込み。実機CPUが厳しい場合は false を優先。
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    correlation_search_space_dimension: 0.5  # 相関探索（通常）
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    loop_search_space_dimension: 8.0  # 相関探索（ループ閉じ込み）
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    distance_variance_penalty: 0.3  # スキャンマッチャ重み
    angle_variance_penalty: 0.3

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
